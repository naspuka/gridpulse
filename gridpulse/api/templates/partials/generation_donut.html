<div class="card-header">
    <h2>Generation mix (national)</h2>
    {% if period %}<span class="meta">{{ period.strftime("%H:%M") }} UTC</span>{% endif %}
</div>

{% if fuels %}
    {% set uid = (period.timestamp() if period else 0)|int %}
    <div class="chart-host">
        <canvas id="genmix-{{ uid }}"></canvas>
    </div>

    <script type="application/json" id="genmix-data-{{ uid }}">
    {{ {
        "labels": (fuels | map(attribute="fuel") | list),
        "mw":     (fuels | map(attribute="mw") | list),
        "renewable": (fuels | map(attribute="is_renewable") | list)
    } | tojson }}
    </script>

    <script>
    (function () {
        const id = "{{ uid }}";
        function render() {
            const el = document.getElementById("genmix-" + id);
            const node = document.getElementById("genmix-data-" + id);
            if (!el || !node) { return; }
            if (typeof Chart === "undefined") {
                // Chart.js still loading — try again shortly.
                return setTimeout(render, 100);
            }
            const data = JSON.parse(node.textContent);
            const colours = data.renewable.map(r => r ? "#16a34a" : "#737373");
            new Chart(el, {
                type: "doughnut",
                data: {
                    labels: data.labels,
                    datasets: [{ data: data.mw, backgroundColor: colours, borderWidth: 1 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: "right", labels: { boxWidth: 12, font: { size: 11 } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.parsed.toLocaleString()} MW` } }
                    }
                }
            });
        }
        render();
    })();
    </script>
{% else %}
    <p class="meta">Generation mix mart not yet populated.</p>
{% endif %}
