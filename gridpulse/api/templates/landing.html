{% extends "base.html" %}

{% block title %}Now — UK national{% endblock %}

{% block content %}
<hgroup>
    <h1>Right now in the UK</h1>
    <p>Live grid generation, carbon intensity, and Agile prices. Auto-refreshes every 60 seconds.</p>
</hgroup>

<div class="picker">
    <label for="region-picker">Region:</label>
    <select id="region-picker"
            hx-get=""
            hx-target="body"
            hx-trigger="change"
            hx-push-url="true"
            onchange="this.setAttribute('hx-get', '/region/' + this.value);">
        {% for r in regions %}
            <option value="{{ r.slug }}" {% if agile_region and r.region_id == agile_region.region_id %}selected{% endif %}>
                {{ r.name }}
            </option>
        {% endfor %}
    </select>
</div>

<div class="grid-cards">

    <article class="card"
             hx-get="/partials/current-conditions/national"
             hx-trigger="load, every 60s"
             hx-swap="innerHTML">
        <div class="skeleton"></div>
    </article>

    <article class="card"
             hx-get="/partials/generation-donut"
             hx-trigger="load, every 60s"
             hx-swap="innerHTML">
        <div class="skeleton"></div>
    </article>

    <article class="card full"
             hx-get="/partials/best-slots/{{ agile_region.slug }}"
             hx-trigger="load, every 60s"
             hx-swap="innerHTML">
        <div class="skeleton"></div>
    </article>

    <article class="card full"
             hx-get="/partials/carbon-trend/national"
             hx-trigger="load, every 60s"
             hx-swap="innerHTML">
        <div class="skeleton"></div>
    </article>

</div>
{% endblock %}
